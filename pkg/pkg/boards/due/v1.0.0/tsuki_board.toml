[board]
id          = "due"
name        = "Arduino Due"
fqbn        = "arduino:sam:arduino_due_x"
variant     = "arduino_due_x"
flash_kb    = 512
ram_kb      = 96
description = "Arduino Due — ARM Cortex-M3 AT91SAM3X8E, 84MHz, 512K flash"
author      = "tsuki-team"
version     = "1.0.0"

[toolchain]
type        = "sam"
mcu         = "cortex-m3"
f_cpu       = 84000000

[defines]
values = ["ARDUINO_SAM_DUE", "ARDUINO_ARCH_SAM", "__SAM3X8E__"]
