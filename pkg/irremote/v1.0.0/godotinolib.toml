[package]
name        = "irremote"
version     = "1.0.0"
description = "IR remote send and receive (IRremote library v4)"
author      = "tsuki-team"
cpp_header  = "IRremote.hpp"
arduino_lib = "IRremote"

aliases = ["ir", "IRremote"]

# ── Receiver ──────────────────────────────────────────────────────────────────
[[function]]
go     = "ReceiverBegin"
python = "receiver_begin"
cpp    = "IrReceiver.begin({0}, ENABLE_LED_FEEDBACK)"

[[function]]
go     = "ReceiverBeginNoLed"
python = "receiver_begin_no_led"
cpp    = "IrReceiver.begin({0}, DISABLE_LED_FEEDBACK)"

[[function]]
go     = "DataAvailable"
python = "data_available"
cpp    = "IrReceiver.decode()"

[[function]]
go     = "Resume"
python = "resume"
cpp    = "IrReceiver.resume()"

[[function]]
go     = "GetCommand"
python = "get_command"
cpp    = "IrReceiver.decodedIRData.command"

[[function]]
go     = "GetAddress"
python = "get_address"
cpp    = "IrReceiver.decodedIRData.address"

[[function]]
go     = "GetRawCode"
python = "get_raw_code"
cpp    = "IrReceiver.decodedIRData.decodedRawData"

[[function]]
go     = "GetProtocol"
python = "get_protocol"
cpp    = "IrReceiver.decodedIRData.protocol"

[[function]]
go     = "PrintResultShort"
python = "print_result_short"
cpp    = "IrReceiver.printIRResultShort(&Serial)"

[[function]]
go     = "PrintResultRaw"
python = "print_result_raw"
cpp    = "IrReceiver.printIRResultRawFormatted(&Serial, true)"

# ── Sender ────────────────────────────────────────────────────────────────────
[[function]]
go     = "SenderBegin"
python = "sender_begin"
cpp    = "IrSender.begin({0})"

[[function]]
go     = "SendNEC"
python = "send_nec"
cpp    = "IrSender.sendNEC({0}, {1}, {2})"

[[function]]
go     = "SendSony"
python = "send_sony"
cpp    = "IrSender.sendSony({0}, {1}, {2})"

[[function]]
go     = "SendSamsung"
python = "send_samsung"
cpp    = "IrSender.sendSamsung({0}, {1}, {2})"

[[function]]
go     = "SendRC5"
python = "send_rc5"
cpp    = "IrSender.sendRC5({0}, {1}, {2})"

[[function]]
go     = "SendRC6"
python = "send_rc6"
cpp    = "IrSender.sendRC6({0}, {1}, {2})"

[[function]]
go     = "SendRaw"
python = "send_raw"
cpp    = "IrSender.sendRaw({0}, {1}, 38)"

# ── Constants ─────────────────────────────────────────────────────────────────
[[constant]]
go     = "PROTOCOL_NEC"
python = "PROTOCOL_NEC"
cpp    = "NEC"

[[constant]]
go     = "PROTOCOL_SONY"
python = "PROTOCOL_SONY"
cpp    = "SONY"

[[constant]]
go     = "PROTOCOL_SAMSUNG"
python = "PROTOCOL_SAMSUNG"
cpp    = "SAMSUNG"

[[constant]]
go     = "PROTOCOL_RC5"
python = "PROTOCOL_RC5"
cpp    = "RC5"

[[constant]]
go     = "PROTOCOL_RC6"
python = "PROTOCOL_RC6"
cpp    = "RC6"

[[constant]]
go     = "PROTOCOL_UNKNOWN"
python = "PROTOCOL_UNKNOWN"
cpp    = "UNKNOWN"

# ── Examples ──────────────────────────────────────────────────────────────────
[[example]]
dir = "examples/receiver"

[[example]]
dir = "examples/sender"

[[example]]
dir = "examples/receiver_py"

[[example]]
dir = "examples/sender_py"