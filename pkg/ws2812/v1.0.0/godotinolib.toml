[package]
name        = "ws2812"
version     = "1.0.0"
description = "WS2812 / NeoPixel RGB LED driver (Adafruit NeoPixel)"
author      = "tsuki-team"
cpp_header  = "Adafruit_NeoPixel.h"
arduino_lib = "Adafruit NeoPixel"

aliases = ["neopixel", "NeoPixel"]

# ── Constructor ───────────────────────────────────────────────────────────────
[[function]]
go     = "New"
python = "new"
cpp    = "Adafruit_NeoPixel({0}, {1}, {2})"

# ── Instance methods ──────────────────────────────────────────────────────────
[[function]]
go     = "Begin"
python = "begin"
cpp    = "{0}.begin()"

[[function]]
go     = "Show"
python = "show"
cpp    = "{0}.show()"

[[function]]
go     = "SetPixelColor"
python = "set_pixel_color"
cpp    = "{0}.setPixelColor({1}, {2})"

[[function]]
go     = "SetPixelColorRGB"
python = "set_pixel_color_rgb"
cpp    = "{0}.setPixelColor({1}, {0}.Color({2}, {3}, {4}))"

[[function]]
go     = "Color"
python = "color"
cpp    = "Adafruit_NeoPixel::Color({0}, {1}, {2})"

[[function]]
go     = "ColorRGBW"
python = "color_rgbw"
cpp    = "Adafruit_NeoPixel::Color({0}, {1}, {2}, {3})"

[[function]]
go     = "Clear"
python = "clear"
cpp    = "{0}.clear()"

[[function]]
go     = "Fill"
python = "fill"
cpp    = "{0}.fill({1}, {2}, {3})"

[[function]]
go     = "SetBrightness"
python = "set_brightness"
cpp    = "{0}.setBrightness({1})"

[[function]]
go     = "GetBrightness"
python = "get_brightness"
cpp    = "{0}.getBrightness()"

[[function]]
go     = "NumPixels"
python = "num_pixels"
cpp    = "{0}.numPixels()"

[[function]]
go     = "GetPixelColor"
python = "get_pixel_color"
cpp    = "{0}.getPixelColor({1})"

[[function]]
go     = "UpdateLength"
python = "update_length"
cpp    = "{0}.updateLength({1})"

[[function]]
go     = "UpdateType"
python = "update_type"
cpp    = "{0}.updateType({1})"

[[function]]
go     = "CanShow"
python = "can_show"
cpp    = "{0}.canShow()"

[[function]]
go     = "Rainbow"
python = "rainbow"
cpp    = "{0}.rainbow({1})"

[[function]]
go     = "Gamma32"
python = "gamma32"
cpp    = "Adafruit_NeoPixel::gamma32({0})"

[[function]]
go     = "Sine8"
python = "sine8"
cpp    = "Adafruit_NeoPixel::sine8({0})"

[[function]]
go     = "Gamma8"
python = "gamma8"
cpp    = "Adafruit_NeoPixel::gamma8({0})"

# ── Constants ─────────────────────────────────────────────────────────────────
[[constant]]
go     = "NEO_GRB"
python = "NEO_GRB"
cpp    = "NEO_GRB"

[[constant]]
go     = "NEO_RGB"
python = "NEO_RGB"
cpp    = "NEO_RGB"

[[constant]]
go     = "NEO_RGBW"
python = "NEO_RGBW"
cpp    = "NEO_RGBW"

[[constant]]
go     = "NEO_KHZ800"
python = "NEO_KHZ800"
cpp    = "NEO_KHZ800"

[[constant]]
go     = "NEO_KHZ400"
python = "NEO_KHZ400"
cpp    = "NEO_KHZ400"

# ── Examples ──────────────────────────────────────────────────────────────────
[[example]]
dir = "examples/blink"

[[example]]
dir = "examples/rainbow"

[[example]]
dir = "examples/theater_chase"

[[example]]
dir = "examples/blink_py"

[[example]]
dir = "examples/rainbow_py"