[board]
id             = "nano_old"
name           = "Arduino Nano (old bootloader)"
version        = "1.0.0"
fqbn           = "arduino:avr:nano:cpu=atmega328old"
variant        = "eightanaloginputs"
flash_kb       = 32
ram_kb         = 2
toolchain_type = "avr"
defines        = "ARDUINO_AVR_NANO,ARDUINO_ARCH_AVR"

[avr]
mcu        = "atmega328p"
f_cpu      = 16000000
programmer = "arduino"
baud       = 57600
