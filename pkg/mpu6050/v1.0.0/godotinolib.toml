[package]
name        = "mpu6050"
version     = "1.0.0"
description = "MPU-6050 6-axis accelerometer and gyroscope (Adafruit MPU6050)"
author      = "tsuki-team"
cpp_header  = "Adafruit_MPU6050.h"
arduino_lib = "Adafruit MPU6050"
cpp_class   = "Adafruit_MPU6050"

aliases = ["MPU6050", "imu"]

# ── Constructor ───────────────────────────────────────────────────────────────
[[function]]
go     = "New"
python = "new"
cpp    = "Adafruit_MPU6050()"

# ── Init ──────────────────────────────────────────────────────────────────────
[[function]]
go     = "Begin"
python = "begin"
cpp    = "{0}.begin()"

# ── Read sensor events ────────────────────────────────────────────────────────
[[function]]
go     = "GetEvent"
python = "get_event"
cpp    = "{0}.getEvent(&{1}, &{2}, &{3})"

# ── Configuration ─────────────────────────────────────────────────────────────
[[function]]
go     = "SetAccelerometerRange"
python = "set_accelerometer_range"
cpp    = "{0}.setAccelerometerRange({1})"

[[function]]
go     = "SetGyroRange"
python = "set_gyro_range"
cpp    = "{0}.setGyroRange({1})"

[[function]]
go     = "SetFilterBandwidth"
python = "set_filter_bandwidth"
cpp    = "{0}.setFilterBandwidth({1})"

# ── Raw data field accessors ──────────────────────────────────────────────────
[[function]]
go     = "AccelX"
python = "accel_x"
cpp    = "{0}.acceleration.x"

[[function]]
go     = "AccelY"
python = "accel_y"
cpp    = "{0}.acceleration.y"

[[function]]
go     = "AccelZ"
python = "accel_z"
cpp    = "{0}.acceleration.z"

[[function]]
go     = "GyroX"
python = "gyro_x"
cpp    = "{0}.gyro.x"

[[function]]
go     = "GyroY"
python = "gyro_y"
cpp    = "{0}.gyro.y"

[[function]]
go     = "GyroZ"
python = "gyro_z"
cpp    = "{0}.gyro.z"

[[function]]
go     = "Temp"
python = "temp"
cpp    = "{0}.temperature"

# ── Constants ─────────────────────────────────────────────────────────────────
[[constant]]
go     = "RANGE_2_G"
python = "RANGE_2_G"
cpp    = "MPU6050_RANGE_2_G"

[[constant]]
go     = "RANGE_4_G"
python = "RANGE_4_G"
cpp    = "MPU6050_RANGE_4_G"

