[package]
name        = "u8g2"
version     = "1.0.0"
description = "U8g2 monochrome display library (OLED, LCD)"
author      = "tsuki-team"
cpp_header  = "U8g2lib.h"
arduino_lib = "U8g2"

aliases = ["U8g2", "oled"]

# ── Constructors ──────────────────────────────────────────────────────────────
[[function]]
go     = "NewSSD1306_128x64"
python = "new_ssd1306_128x64"
cpp    = "U8G2_SSD1306_128X64_NONAME_F_HW_I2C({0}, U8X8_PIN_NONE)"

[[function]]
go     = "NewSH1106_128x64"
python = "new_sh1106_128x64"
cpp    = "U8G2_SH1106_128X64_NONAME_F_HW_I2C({0}, U8X8_PIN_NONE)"

# ── Lifecycle ─────────────────────────────────────────────────────────────────
[[function]]
go     = "Begin"
python = "begin"
cpp    = "{0}.begin()"

[[function]]
go     = "ClearBuffer"
python = "clear_buffer"
cpp    = "{0}.clearBuffer()"

[[function]]
go     = "SendBuffer"
python = "send_buffer"
cpp    = "{0}.sendBuffer()"

[[function]]
go     = "Clear"
python = "clear"
cpp    = "{0}.clear()"

# ── Drawing ───────────────────────────────────────────────────────────────────
[[function]]
go     = "SetFont"
python = "set_font"
cpp    = "{0}.setFont({1})"

[[function]]
go     = "DrawStr"
python = "draw_str"
cpp    = "{0}.drawStr({1}, {2}, {3})"

[[function]]
go     = "DrawBox"
python = "draw_box"
cpp    = "{0}.drawBox({1}, {2}, {3}, {4})"

[[function]]
go     = "DrawFrame"
python = "draw_frame"
cpp    = "{0}.drawFrame({1}, {2}, {3}, {4})"

[[function]]
go     = "DrawCircle"
python = "draw_circle"
cpp    = "{0}.drawCircle({1}, {2}, {3})"

[[function]]
go     = "DrawDisc"
python = "draw_disc"
cpp    = "{0}.drawDisc({1}, {2}, {3})"

[[function]]
go     = "DrawLine"
python = "draw_line"
cpp    = "{0}.drawLine({1}, {2}, {3}, {4})"

[[function]]
go     = "DrawPixel"
python = "draw_pixel"
cpp    = "{0}.drawPixel({1}, {2})"

[[function]]
go     = "DrawBitmap"
python = "draw_bitmap"
cpp    = "{0}.drawBitmap({1}, {2}, {3}, {4}, {5})"

[[function]]
go     = "SetDrawColor"
python = "set_draw_color"
cpp    = "{0}.setDrawColor({1})"

[[function]]
go     = "GetDisplayWidth"
python = "get_display_width"
cpp    = "{0}.getDisplayWidth()"

[[function]]
go     = "GetDisplayHeight"
python = "get_display_height"
cpp    = "{0}.getDisplayHeight()"

[[function]]
go     = "SetContrast"
python = "set_contrast"
cpp    = "{0}.setContrast({1})"

[[function]]
go     = "SetFlipMode"
python = "set_flip_mode"
cpp    = "{0}.setFlipMode({1})"

[[function]]
go     = "SetPowerSave"
python = "set_power_save"
cpp    = "{0}.setPowerSave({1})"

# ── Constants ─────────────────────────────────────────────────────────────────
[[constant]]
go     = "ROTATION_R0"
python = "ROTATION_R0"
cpp    = "U8G2_R0"

[[constant]]
go     = "ROTATION_R1"
python = "ROTATION_R1"
cpp    = "U8G2_R1"

[[constant]]
go     = "ROTATION_R2"
python = "ROTATION_R2"
cpp    = "U8G2_R2"

[[constant]]
go     = "ROTATION_R3"
python = "ROTATION_R3"
cpp    = "U8G2_R3"

# ── Examples ──────────────────────────────────────────────────────────────────
[[example]]
dir = "examples/hello_world"

[[example]]
dir = "examples/counter"

[[example]]
dir = "examples/hello_world_py"

[[example]]
dir = "examples/counter_py"