[board]
id          = "pro_mini_5v"
name        = "Arduino Pro Mini 5V"
fqbn        = "arduino:avr:pro:cpu=16MHzatmega328"
variant     = "eightanaloginputs"
flash_kb    = 32
ram_kb      = 2
description = "Arduino Pro Mini 5V/16MHz — ATmega328P, no USB, requires FTDI"
author      = "tsuki-team"
version     = "1.0.0"

[toolchain]
type        = "avr"
mcu         = "atmega328p"
f_cpu       = 16000000
programmer  = "arduino"
baud        = 57600

[defines]
values = ["ARDUINO_AVR_PRO", "ARDUINO_ARCH_AVR"]
