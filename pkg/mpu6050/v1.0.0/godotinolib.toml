python = "RANGE_1000_DEG"
cpp    = "MPU6050_RANGE_1000_DEG"

[[constant]]
go     = "RANGE_2000_DEG"
python = "RANGE_2000_DEG"
cpp    = "MPU6050_RANGE_2000_DEG"

[[constant]]
go     = "BAND_5_HZ"
python = "BAND_5_HZ"
cpp    = "MPU6050_BAND_5_HZ"

[[constant]]
go     = "BAND_10_HZ"
