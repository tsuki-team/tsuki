[board]
id          = "nano"
name        = "Arduino Nano"
fqbn        = "arduino:avr:nano"
variant     = "eightanaloginputs"
flash_kb    = 32
ram_kb      = 2
description = "Arduino Nano — AVR ATmega328P, compact DIP form factor"
author      = "tsuki-team"
version     = "1.0.0"

[toolchain]
type        = "avr"
mcu         = "atmega328p"
f_cpu       = 16000000
programmer  = "arduino"
baud        = 115200

[defines]
values = ["ARDUINO_AVR_NANO", "ARDUINO_ARCH_AVR"]
